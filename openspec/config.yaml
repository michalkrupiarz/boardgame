schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
context: |
  Short Description:
  A turn-based strategy board game focused on municipal growth and resource management. Players develop their city by managing a dynamic economy—balancing gold, production, food, culture, and science. The game features an expansive hexagonal map for exploration and resource harvesting, paired with an immersive city dashboard where players can strategically allocate their production yields to construct new infrastructure and maximize their turn-over-turn advantages.

  Domain:
    Category: Entertainment / Gaming
    Genre: Turn-based Strategy, Resource Management, Map Exploration

  Tech Stack:
    Framework: React 18
    Language: TypeScript
    Build Tool / Bundler: Vite
    Styling: Vanilla CSS 3 (Dynamic custom CSS variables, Glassmorphism UI)
    Testing: Vitest (Unit testing for pure game logic reducers)
    Rendering: SVG-based Hexagonal Geometry (for tile plotting & interactivity)

  Rules File:
    The canonical source of truth for all game rules is docs/rules.md.
    ALWAYS read docs/rules.md before generating any artifact (proposal, design, spec, or tasks).
    All proposals, designs, specs, and tasks must be consistent with the rules defined there.
    If you are unsure whether a mechanic is a rule, check docs/rules.md first.

  Rules Review Pass:
    At the end of every /opsx:apply run, after all tasks are complete, you MUST perform a Rules Review Pass.
    Steps:
      1. Review all code and logic changes made during the apply run.
      2. Apply the rule heuristic: "Does this change affect what a player can or cannot do,
         or what the outcome of an action is?" If yes, it is a candidate rule.
      3. Filter out implementation details (internal state, variable names, UI wiring that
         does not change player experience).
      4. If candidate rules are found, present them as a numbered list in player-friendly,
         rulebook-style language (e.g. "On your turn, you may...").
      5. Ask the reviewer: "Which of these would you like to add to docs/rules.md? (e.g. '1', '1 2', 'all', 'none')"
      6. Write ONLY approved rules into the appropriate section of docs/rules.md.
         Never write to docs/rules.md without explicit reviewer approval.
      7. If no candidate rules are found, state clearly: "No new rules detected in this change."

